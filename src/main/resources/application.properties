# Logging configuration
logging.level.org.reflections=error

# MyJDBC configuration
# Enable/disable SQL statement logging (default: false)
myjdbc.show-sql.enabled=false

# SQL log levels when myjdbc.show-sql.enabled=true (DEBUG/INFO/WARN/ERROR/TRACE/OFF)
myjdbc.show-sql.sql-level=DEBUG
myjdbc.show-sql.param-level=TRACE

# Enable/disable database schema validation at startup (default: true)
myjdbc.validate-schema=true

# JVM arguments for additional validation control:
# -Dmyjdbc.fail-on-validation-error=true    # Fail application startup on validation errors (default: false)
